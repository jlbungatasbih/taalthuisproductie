<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Callsheet — Taalthuis Locatietour</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #f4f4f2;
  --surface:       #ffffff;
  --surface-2:     #fafaf8;
  --border:        #e4e4e0;
  --border-strong: #d0d0ca;
  --text:          #1a1a1a;
  --text-2:        #5a5a5a;
  --text-3:        #9a9a9a;
  --accent:        #1a56db;
  --accent-bg:     #eef3ff;
  --accent-border: #c7d9ff;
  --green:         #0e7a4e;
  --green-bg:      #ecfdf5;
  --green-border:  #a7f3d0;
  --amber:         #92400e;
  --amber-bg:      #fffbeb;
  --amber-border:  #fde68a;
  --purple:        #5b21b6;
  --purple-bg:     #f5f3ff;
  --purple-border: #ddd6fe;
  --red:           #b91c1c;
  --red-bg:        #fff1f2;
  --radius:        12px;
  --radius-sm:     8px;
  --shadow:        0 1px 3px rgba(0,0,0,0.07);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  padding-bottom: 90px;
  -webkit-tap-highlight-color: transparent;
}

/* ── STICKY HEADER ── */
#sticky-top {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

#progress-wrap { padding: 10px 16px 8px; border-bottom: 1px solid var(--border); }
#progress-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
#progress-label { font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--text-3); }
#progress-pct   { font-size: 12px; font-weight: 700; color: var(--accent); }
#progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
#progress-fill  { height: 100%; background: var(--accent); border-radius: 99px; width: 0%; transition: width .4s ease; }

/* ── DAY TABS ── */
#day-tabs { display: flex; }
.day-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  padding: 10px 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  border-bottom: 3px solid transparent;
  transition: border-color .15s, color .15s;
  color: var(--text-3);
  touch-action: manipulation;
}
.day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-label { font-size: 14px; font-weight: 700; }
.tab-date  { font-size: 11px; }

/* ── LAYOUT ── */
#wrap { padding: 0 12px 16px; max-width: 680px; margin: 0 auto; }

/* ── STD CHECKLIST ── */
.std-section { margin-bottom: 10px; }

#std-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  touch-action: manipulation;
  gap: 10px;
}
#std-toggle.open { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }

#std-toggle-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#std-done-count { font-size: 12px; font-weight: 700; color: var(--accent); }
#std-chevron { font-size: 11px; color: var(--text-3); transition: transform .2s; }
#std-toggle.open #std-chevron { transform: rotate(90deg); }

#std-body {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  padding: 4px 16px 12px;
}

.std-item {
  display: flex;
  align-items: center;
  padding: 2px 0;
  border-bottom: 1px solid var(--border);
}
.std-item:last-child { border-bottom: none; }

.std-check-label {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 9px 4px;
  cursor: pointer;
  user-select: none;
}

.std-check-label input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  min-width: 24px;
  border: 2px solid var(--border-strong);
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  transition: all .15s;
  flex-shrink: 0;
}
.std-check-label input[type="checkbox"]:checked {
  background: var(--accent);
  border-color: var(--accent);
}
.std-check-label input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  top: 4px; left: 7px;
  width: 6px; height: 10px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}
.std-num  { font-size: 11px; font-weight: 700; color: var(--accent); min-width: 18px; }
.std-text { font-size: 14px; color: var(--text); transition: color .2s; }
.std-check-label input:checked ~ .std-num  { color: var(--text-3); }
.std-check-label input:checked ~ .std-text { color: var(--text-3); text-decoration: line-through; text-decoration-color: var(--text-3); }

/* ── DAY HEADER ── */
.day-header     { padding: 16px 4px 12px; }
.day-title      { font-size: 19px; font-weight: 700; letter-spacing: -.01em; }
.day-subtitle   { font-size: 14px; color: var(--text-2); margin-top: 1px; }
.day-note       { font-size: 14px; color: var(--amber); margin-top: 8px; padding: 10px 14px; background: var(--amber-bg); border: 1px solid var(--amber-border); border-radius: var(--radius-sm); line-height: 1.4; }

/* ── BLOCKS ── */
.block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  transition: border-color .25s;
}
.block.all-done { border-color: var(--green-border); }

/* ── BLOCK HEAD ── */
.block-head { display: flex; align-items: stretch; }

.time-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 10px;
  min-width: 68px;
  background: var(--surface-2);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  gap: 2px;
}
.t-start { font-size: 13px; font-weight: 700; color: var(--text); }
.t-arrow  { font-size: 9px; color: var(--text-3); }
.t-end    { font-size: 13px; font-weight: 400; color: var(--text-2); }

.block-meta {
  flex: 1;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  min-width: 0;
}
.block-tag  { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.tag-loc    { color: var(--accent); }
.tag-travel { color: var(--text-3); }
.block-name { font-size: 17px; font-weight: 700; line-height: 1.25; }
.block-addr { font-size: 13px; color: var(--text-2); }
.block-dur  { font-size: 13px; color: var(--text-3); margin-top: 1px; }

.done-chip {
  display: none;
  align-items: center;
  gap: 5px;
  margin-top: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: 99px;
  padding: 3px 10px;
  width: fit-content;
}
.block.all-done .done-chip { display: flex; }

/* ── SECTION ── */
.section { border-top: 1px solid var(--border); padding: 13px 16px; }
.sec-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }

/* ── PARKING ── */
.parking-row { display: flex; gap: 10px; align-items: flex-start; }
.p-icon { width: 30px; height: 30px; min-width: 30px; background: var(--accent); color: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; margin-top: 1px; }
.p-main { font-size: 15px; color: var(--text); line-height: 1.4; }
.p-note { font-size: 13px; color: var(--text-2); margin-top: 3px; }

/* ── CHECKLIST ── */
.checklist { list-style: none; display: flex; flex-direction: column; gap: 1px; }
.check-item { display: flex; align-items: center; border-radius: var(--radius-sm); }
.check-label {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 9px 4px;
  cursor: pointer;
  user-select: none;
}
.check-label input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 26px;
  height: 26px;
  min-width: 26px;
  border: 2px solid var(--border-strong);
  border-radius: 7px;
  cursor: pointer;
  position: relative;
  transition: all .15s;
  flex-shrink: 0;
}
.check-label input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
.check-label input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  top: 4px; left: 7px;
  width: 7px; height: 11px;
  border: 2.5px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}
.check-text { font-size: 15px; color: var(--text); line-height: 1.4; transition: color .2s; }
.check-label input:checked ~ .check-text { color: var(--text-3); text-decoration: line-through; text-decoration-color: var(--text-3); }

/* ── CTA dual boxes ── */
.cta-pair { display: flex; flex-direction: column; gap: 8px; }
.cta-item { position: relative; border-radius: 8px; padding: 10px 14px; }
.cta-item-social { background: #eef3ff; border: 1px solid #c7d9ff; }
.cta-item-website { background: #ecfdf5; border: 1px solid #a7f3d0; }
.cta-item-label { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 4px; }
.cta-item-social .cta-item-label { color: #1a56db; }
.cta-item-website .cta-item-label { color: #0e7a4e; }
.cta-item-text { font-size: 13px; font-style: italic; line-height: 1.45; padding-right: 60px; color: #2a2a2a; }
.btn-copy-sm {
  position: absolute;
  top: 10px; right: 10px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
  font-family: inherit;
  touch-action: manipulation;
}
.cta-item-social .btn-copy-sm { background: #c7d9ff; color: #1a56db; }
.cta-item-website .btn-copy-sm { background: #a7f3d0; color: #0e7a4e; }
.btn-copy-sm.copied { opacity: .7; }

/* ── TIP ── */
.tip-box {
  display: flex;
  gap: 10px;
  background: var(--purple-bg);
  border: 1px solid var(--purple-border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
}
.tip-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; color: var(--purple); }
.tip-text { font-size: 14px; color: var(--purple); line-height: 1.45; }

/* ── TRAVEL NOTE ── */
.travel-note { padding: 8px 16px 14px; font-size: 14px; color: var(--text-3); }

/* ── SCRIPT SECTION ── */
.script-wrap { border-top: 1px solid var(--border); }

.script-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 12px 16px;
  min-height: 48px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  touch-action: manipulation;
}
.script-toggle-lbl {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-3);
}
.script-toggle-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.script-step-count { font-size: 12px; font-weight: 600; color: var(--accent); }
.s-chevron { font-size: 11px; color: var(--text-3); transition: transform .2s; }
.script-toggle[aria-expanded="true"] .s-chevron { transform: rotate(90deg); }
.script-toggle[aria-expanded="true"] { border-bottom: 1px solid var(--border); }

.script-body {
  display: none;
  background: var(--accent-bg);
  padding: 10px 16px 14px;
}
.script-body.open { display: block; }

.script-steps { list-style: none; }

.script-step {
  display: flex;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--accent-border);
}
.script-step:last-child { border-bottom: none; }

.script-step-inner { flex: 1; }
.script-step-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.script-step-line  { font-size: 14px; font-style: italic; color: #1e3a8a; margin-top: 5px; line-height: 1.5; }
.script-step-note  { font-size: 13px; color: var(--text-2); margin-top: 5px; line-height: 1.4; }

/* Script deel header */
.script-deel {
  background: #f0f0ee;
  padding: 7px 10px;
  margin: 8px 0 4px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: #5a5a5a;
}

/* Knipmoment banner */
.script-knip {
  margin: 10px 0;
  background: #fff7ed;
  border: 1px solid #fed7aa;
  border-radius: 8px;
  padding: 8px 12px;
  text-align: center;
}
.script-knip-title {
  font-size: 13px;
  font-weight: 700;
  color: #c2410c;
}
.script-knip-sub {
  font-size: 11px;
  color: #9a3412;
  font-style: italic;
  margin-top: 2px;
}

/* Role labels */
.script-role {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.role-mikki { background: #eef3ff; color: #1a56db; }
.role-broll { background: #f4f4f2; color: #6b6b6b; }

/* Opt A/B sub-items */
.script-opt {
  display: flex;
  gap: 8px;
  margin-top: 5px;
  font-size: 13px;
  line-height: 1.45;
}
.opt-label {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  margin-top: 1px;
  flex-shrink: 0;
}
.opt-a { background: #eef3ff; color: #1a56db; }
.opt-b { background: #ecfdf5; color: #0e7a4e; }
.opt-text { color: #2a2a2a; font-style: italic; }

/* ── FOOTER ── */
#footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.foot-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.foot-val  { font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
.foot-key  { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--text-3); }
.foot-div  { width: 1px; height: 36px; background: var(--border); }

@media (min-width: 600px) {
  #wrap { padding: 0 20px 20px; }
}
</style>
</head>
<body>

<!-- STICKY HEADER -->
<div id="sticky-top">
  <div id="progress-wrap">
    <div id="progress-meta">
      <span id="progress-label">Voortgang dag</span>
      <span id="progress-pct">0%</span>
    </div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
  <div id="day-tabs">
    <button class="day-tab active" data-day="0"><span class="tab-label">Dag 1</span><span class="tab-date">Wo 3 jun</span></button>
    <button class="day-tab"        data-day="1"><span class="tab-label">Dag 2</span><span class="tab-date">Di 10 jun</span></button>
    <button class="day-tab"        data-day="2"><span class="tab-label">Dag 3</span><span class="tab-date">Wo 11 jun</span></button>
  </div>
</div>

<!-- MAIN WRAPPER -->
<div id="wrap">

  <!-- STANDARD CHECKLIST -->
  <div class="std-section">
    <button id="std-toggle" onclick="toggleStd()">
      <span>Standaard checklist — alle locaties</span>
      <span id="std-toggle-right">
        <span id="std-done-count">0/9</span>
        <span id="std-chevron">▸</span>
      </span>
    </button>
    <div id="std-body">
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="0"><span class="std-num">1</span><span class="std-text">B-roll van de stad en de highlights (sfeer en route)</span></label></div>
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="1"><span class="std-num">2</span><span class="std-text">Looproute in beeld (presentator die voorop loopt / POV)</span></label></div>
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="2"><span class="std-num">3</span><span class="std-text">HET KNIPMOMENT: laat de presentator een duidelijke pauze vallen tussen het social media-deel en het praktische website-deel</span></label></div>
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="3"><span class="std-num">4</span><span class="std-text">Twee intro-versies opnemen: "Welkom bij..." (website) en "Hier is het!" (social backup)</span></label></div>
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="4"><span class="std-num">5</span><span class="std-text">Praktische info buiten: de voordeur & naambordje duidelijk in beeld</span></label></div>
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="5"><span class="std-num">6</span><span class="std-text">Praktische info buiten: op welke bel moet je drukken? (close-up)</span></label></div>
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="6"><span class="std-num">7</span><span class="std-text">Praktische info binnen: naar welke verdieping / lift of trap?</span></label></div>
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="7"><span class="std-num">8</span><span class="std-text">Binnenkomst lokaal: sfeer laten zien</span></label></div>
      <div class="std-item"><label class="std-check-label"><input type="checkbox" data-std="8"><span class="std-num">9</span><span class="std-text">Twee CTA's inspreken: DM-reactie (Social) en aanmeld-oproep (Website)</span></label></div>
    </div>
  </div>

  <!-- DAY CONTENT (dynamic) -->
  <div id="day-content"></div>

</div>

<!-- FOOTER -->
<div id="footer">
  <div class="foot-item"><span class="foot-val" id="f-day-hrs">—</span><span class="foot-key">Uren vandaag</span></div>
  <div class="foot-div"></div>
  <div class="foot-item"><span class="foot-val" id="f-total-hrs">—</span><span class="foot-key">Totaal 3 dagen</span></div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const DAYS = [

/* ── DAG 1: Noord-Holland (Wo 3 jun) ── */
{
  id: 'dag1', label: 'Dag 1 — Woensdag 3 juni', subtitle: 'Noord-Holland',
  note: 'Later vertrekken om de ochtendspits te vermijden. Dag rondt mooi af rond 17:00.',
  blocks: [
    { id:'r-hl-hilv', type:'travel', start:'09:15', end:'10:15', name:'Reistijd Haarlem → Hilversum' },
    {
      id:'loc-hilversum', type:'location', start:'10:15', end:'11:45',
      name:'Hilversum', address:'Oude Torenstraat 41',
      parking:'Parkeergarage Gooische Brink — Brinkweg 1', parkingNote:null,
      tip:'Productievolgorde: begin op de locatie (Deel 2 eerst filmen), daarna naar het station voor het sociale Deel 1. Zo bespaar je looptijd op de dag.',
      shots:['Station Hilversum (opening social)','Mediastad architectuur / Beeld en Geluid (B-roll)','Kerkbrink & Fotomuseum (B-roll)','Hillywings mural (B-roll)','Voordeur & naambordje in beeld','Bel close-up','Binnenkant lokaal'],
      ctaSocial:'Wil jij Nederlands leren in Hilversum? Reageer dan met HILVERSUM en krijg direct alle informatie over deze locatie, het actuele rooster en startdata in jouw DM!',
      ctaWebsite:'Wil jij Nederlands leren in Hilversum? Bekijk het actuele rooster en de startdata en meld je direct aan. Hopelijk tot snel in de les!',
      script:[
        {type:'deel', title:'Deel 1 — Social Media: Sfeer & Highlights'},
        {type:'step', role:'Mikki', title:'Opening bij station Hilversum', line:'We zijn net aangekomen in Hilversum! De Taalthuis locatie ligt op ongeveer tien minuutjes lopen van het station. Ga je mee?'},
        {type:'step', role:'B-roll/V.O.', title:'Wandelroute highlights', note:'Hilversum is echt een mediastad. Rondom het station zie je gelijk veel moderne architectuur en street art! [B-roll: Instituut Beeld en Geluid, street art]. We lopen via de Kerkbrink, één van de mooiste pleinen van Hilversum vol oude bomen, terrassen en het Fotomuseum. En check deze bekende kleurrijke Hillywings mural waar we langs komen, perfect voor een foto!'},

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const SK = 'taalthuis-v4';
let state = {};
try { state = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e) {}
function save() { try { localStorage.setItem(SK, JSON.stringify(state)); } catch(e) {} }
function bs(id) { if (!state[id]) state[id] = { checks: {} }; return state[id]; }
function stdState() { if (!state['std']) state['std'] = {}; return state['std']; }

/* ═══════════════════════════════════════════
   TIME UTILS
═══════════════════════════════════════════ */
function mins(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function hm(m) { if(m<0)m=Math.abs(m); const h=Math.floor(m/60),mm=m%60; if(h===0)return mm+'m'; if(mm===0)return h+'u'; return h+'u '+mm+'m'; }

/* ═══════════════════════════════════════════
   ACTIVE DAY
═══════════════════════════════════════════ */
let activeDay = state._day || 0;

function switchDay(idx) {
  activeDay = idx;
  state._day = idx;
  save();
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  renderDay();
}

/* ═══════════════════════════════════════════
   STANDARD CHECKLIST
═══════════════════════════════════════════ */
function toggleStd() {
  const btn  = document.getElementById('std-toggle');
  const body = document.getElementById('std-body');
  const open = btn.classList.contains('open');
  btn.classList.toggle('open', !open);
  body.style.display = open ? 'none' : 'block';
}

function initStdChecklist() {
  const st = stdState();
  document.querySelectorAll('[data-std]').forEach(cb => {
    const i = Number(cb.dataset.std);
    cb.checked = !!st[i];
    cb.addEventListener('change', () => {
      stdState()[i] = cb.checked;
      save();
      updateStdCount();
    });
  });
  updateStdCount();
}

function updateStdCount() {
  const st = stdState();
  const done = Object.values(st).filter(Boolean).length;
  document.getElementById('std-done-count').textContent = done + '/9';
}

/* ═══════════════════════════════════════════
   RENDER DAY
═══════════════════════════════════════════ */
function renderDay() {
  const day = DAYS[activeDay];
  const c = document.getElementById('day-content');
  c.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'day-header';
  hdr.innerHTML = `
    <div class="day-title">${day.label}</div>
    <div class="day-subtitle">${day.subtitle}</div>
    ${day.note ? `<div class="day-note">${day.note}</div>` : ''}
  `;
  c.appendChild(hdr);

  day.blocks.forEach(b => c.appendChild(buildBlock(b)));
  updateGlobal();
}

/* ═══════════════════════════════════════════
   BUILD SCRIPT SECTION
═══════════════════════════════════════════ */
function buildScriptSection(b, wrap) {
  if (!b.script || !b.script.length) return;

  const sw = document.createElement('div');
  sw.className = 'script-wrap';

  const stepCount = b.script.filter(s => s.type === 'step').length;

  const stoggle = document.createElement('button');
  stoggle.className = 'script-toggle';
  stoggle.setAttribute('aria-expanded', 'false');
  stoggle.innerHTML = `
    <span class="script-toggle-lbl">Script</span>
    <span class="script-toggle-right">
      <span class="script-step-count">${stepCount} stappen</span>
      <span class="s-chevron">▸</span>
    </span>
  `;

  const sbody = document.createElement('div');
  sbody.className = 'script-body';
  sbody.id = 'script-' + b.id;

  const ol = document.createElement('ol');
  ol.className = 'script-steps';

  let stepNum = 0;
  b.script.forEach(item => {
    if (item.type === 'deel') {
      const d = document.createElement('div');
      d.className = 'script-deel';
      d.textContent = item.title;
      ol.appendChild(d);
    } else if (item.type === 'knip') {
      const k = document.createElement('div');
      k.className = 'script-knip';
      k.innerHTML = '<div class="script-knip-title">✂ KNIPMOMENT VOOR DE EDIT ✂</div><div class="script-knip-sub">Vanaf hier is de video los te knippen voor de website</div>';
      ol.appendChild(k);
    } else if (item.type === 'step') {
      stepNum++;
      const li = document.createElement('li');
      li.className = 'script-step';
      const roleClass = item.role && item.role.startsWith('Mikki') ? 'role-mikki' : 'role-broll';
      let html = `<div class="script-step-inner">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:700;color:#9a9a9a;min-width:18px;">${stepNum}</span>
          <span class="script-role ${roleClass}">${item.role || 'Mikki'}</span>
          <span class="script-step-title">${item.title}</span>
        </div>`;
      if (item.line) html += `<div class="script-step-line">"${item.line}"</div>`;
      if (item.note) html += `<div class="script-step-note">${item.note}</div>`;
      if (item.optA || item.optB) {
        if (item.optA) html += `<div class="script-opt"><span class="opt-label opt-a">A</span><span class="opt-text">"${item.optA}"</span></div>`;
        if (item.optB) html += `<div class="script-opt"><span class="opt-label opt-b">B</span><span class="opt-text">"${item.optB}"</span></div>`;
      }
      html += '</div>';
      li.innerHTML = html;
      ol.appendChild(li);
    }
  });

  sbody.appendChild(ol);

  stoggle.addEventListener('click', () => {
    const open = stoggle.getAttribute('aria-expanded') === 'true';
    stoggle.setAttribute('aria-expanded', String(!open));
    sbody.classList.toggle('open', !open);
  });

  sw.appendChild(stoggle);
  sw.appendChild(sbody);
  wrap.appendChild(sw);
}

/* ═══════════════════════════════════════════
   BUILD BLOCK
═══════════════════════════════════════════ */
function buildBlock(b) {
  const dur = mins(b.end) - mins(b.start);
  const wrap = document.createElement('div');
  wrap.className = `block type-${b.type}`;
  wrap.dataset.id = b.id;

  // Head
  const head = document.createElement('div');
  head.className = 'block-head';
  head.innerHTML = `
    <div class="time-col">
      <span class="t-start">${b.start}</span>
      <span class="t-arrow">▾</span>
      <span class="t-end">${b.end}</span>
    </div>
    <div class="block-meta">
      <span class="block-tag ${b.type==='location'?'tag-loc':'tag-travel'}">
        ${b.type==='location'?'Locatie':'Reistijd'}${b.badge?' &middot; '+b.badge:''}
      </span>
      <span class="block-name">${b.name}</span>
      ${b.address?`<span class="block-addr">${b.address}</span>`:''}
      <span class="block-dur">${hm(dur)}</span>
      ${b.type==='location'?'<span class="done-chip"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Afgerond</span>':''}
    </div>
  `;
  wrap.appendChild(head);

  if (b.type === 'travel' && b.note) {
    const tn = document.createElement('div');
    tn.className = 'travel-note';
    tn.textContent = b.note;
    wrap.appendChild(tn);
  }

  if (b.type === 'location') {
    // Parking
    if (b.parking) {
      const ps = document.createElement('div');
      ps.className = 'section';
      ps.innerHTML = `<div class="sec-label">Parkeren</div>
        <div class="parking-row">
          <div class="p-icon">P</div>
          <div>
            <div class="p-main">${b.parking}</div>
            ${b.parkingNote?`<div class="p-note">${b.parkingNote}</div>`:''}
          </div>
        </div>`;
      wrap.appendChild(ps);
    }

    // Shots checklist
    const cs = document.createElement('div');
    cs.className = 'section';
    const slbl = document.createElement('div');
    slbl.className = 'sec-label';
    slbl.textContent = 'Shots';
    cs.appendChild(slbl);

    const ul = document.createElement('ul');
    ul.className = 'checklist';
    const bst = bs(b.id);
    b.shots.forEach((shot, i) => {
      const li = document.createElement('li');
      li.className = 'check-item';
      const lbl = document.createElement('label');
      lbl.className = 'check-label';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!bst.checks[i];
      cb.addEventListener('change', () => {
        bs(b.id).checks[i] = cb.checked;
        save();
        updateBlock(b.id);
        updateGlobal();
      });
      const sp = document.createElement('span');
      sp.className = 'check-text';
      sp.textContent = shot;
      lbl.appendChild(cb);
      lbl.appendChild(sp);
      li.appendChild(lbl);
      ul.appendChild(li);
    });
    cs.appendChild(ul);
    wrap.appendChild(cs);

    // Script
    buildScriptSection(b, wrap);

    // Tip
    if (b.tip) {
      const ts = document.createElement('div');
      ts.className = 'section';
      ts.innerHTML = `<div class="tip-box"><div class="tip-icon">&#9432;</div><div class="tip-text">${b.tip}</div></div>`;
      wrap.appendChild(ts);
    }
  }

  if (b.type === 'location') updateBlock(b.id);

  return wrap;
}

/* ═══════════════════════════════════════════
   UPDATE BLOCK DONE STATE
═══════════════════════════════════════════ */
function updateBlock(id) {
  const b = DAYS[activeDay].blocks.find(x => x.id === id);
  if (!b || b.type !== 'location') return;
  const bst = bs(id);
  const done = Object.values(bst.checks).filter(Boolean).length;
  const el = document.querySelector(`.block[data-id="${id}"]`);
  if (el) el.classList.toggle('all-done', done === b.shots.length);
}

/* ═══════════════════════════════════════════
   UPDATE GLOBAL STATS
═══════════════════════════════════════════ */
function updateGlobal() {
  // Progress bar (shots current day)
  const day = DAYS[activeDay];
  let totalShots = 0, doneShots = 0;
  day.blocks.forEach(b => {
    if (b.type === 'location' && b.shots) {
      totalShots += b.shots.length;
      doneShots  += Object.values(bs(b.id).checks).filter(Boolean).length;
    }
  });
  const pct = totalShots > 0 ? Math.round((doneShots / totalShots) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';

  // Footer: planned hours current day
  const first = day.blocks[0], last = day.blocks[day.blocks.length - 1];
  document.getElementById('f-day-hrs').textContent = hm(mins(last.end) - mins(first.start));

  // Footer: planned hours all days
  let totalMins = 0;
  DAYS.forEach(d => {
    const f = d.blocks[0], l = d.blocks[d.blocks.length - 1];
    totalMins += mins(l.end) - mins(f.start);
  });
  document.getElementById('f-total-hrs').textContent = hm(totalMins);
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
document.querySelectorAll('.day-tab').forEach((tab, i) => {
  tab.addEventListener('click', () => switchDay(Number(tab.dataset.day)));
  tab.classList.toggle('active', i === activeDay);
});

// Ensure state is saved when iOS closes/hides the page
window.addEventListener('pagehide', save);

initStdChecklist();
renderDay();
</script>
</body>
</html>
